<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 为 GitHub Pages 添加必要的 CSP -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://47.113.226.71; style-src 'self' 'unsafe-inline';">
    <title>Weibo Lucky Draw Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1991da;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Weibo Lucky Draw Tool</h1>

    <div class="input-group">
        <label for="weiboUrl">微博链接:</label>
        <input type="text" id="weiboUrl" placeholder="请输入微博链接">
    </div>

    <div class="input-group">
        <label for="userCount">抽取人数:</label>
        <input type="number" id="userCount" placeholder="请输入需要抽取的人数" min="1">
    </div>

    <button id="fetchButton">抽取中奖用户</button>

    <div id="result"></div>

    <!-- 使用 defer 确保 DOM 加载完成后执行脚本 -->
    <script src="static/js/script.js" defer></script>
</body>

</html>
